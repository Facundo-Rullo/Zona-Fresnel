<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Zona de Fresnel</title>
    <style>
       *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #eef3f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: white;
    padding: 35px;
    border-radius: 15px;
    width: 600px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

h1 {
    color: #123456;
    font-size: 38px;
    text-align: center;
    margin-bottom: 12px;
}

.autor {
    font-size: 15px;
    color: #555;
    text-align: center;
    margin-bottom: 20px;
}

.formula {
    margin-bottom: 20px;
    background: #f4f4f4;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

label {
    display: block;
    margin-bottom: 8px;
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}

input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border: 1px solid #bfc7d1;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: .2s;
}

input::placeholder {
    color: #8d8d8d;
}

input:focus {
    border-color: #123456;
    box-shadow: 0 0 0 3px rgba(18, 52, 86, .15);
}

button {
    width: 100%;
    margin-top: 25px;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #123456;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: .2s;
}

button:hover {
    background: #0d263f;
}

.resultado {
    margin-top: 25px;
    text-align: center;
    font-size: 30px;
    font-weight: bold;
    color: #0b6623;
}

.error {
    margin-top: 18px;
    text-align: center;
    color: #c62828;
    font-weight: bold;
    font-size: 16px;
}

@media (max-width: 480px) {
    .card {
        width: 95%;
        padding: 25px;
    }

    h1 {
        font-size: 30px;
    }

    .resultado {
        font-size: 24px;
    }
}
    </style>
</head>

<body>

    <div class="card">
        <h1>Calculadora Zona de Fresnel</h1>
        <p class="autor">Creado por: Facundo Rullo</p>

        <div class="formula">
            F1 = 8.656 × √(D / f)
        </div>

        <label>Distancia D en kilómetros:</label>
        <input type="text" id="distancia" placeholder="Ej: 5 o 5,5">

        <label>Frecuencia f en GHz:</label>
        <input type="text" id="frecuencia" placeholder="Ej: 2.4 o 2,4">

        <button onclick="calcularFresnel()">Calcular</button>

        <div id="mensaje"></div>
        <div id="resultado" class="resultado"></div>
    </div>

    <script>
        function validarNumero(valor) {
            valor = valor.trim().replace(",", ".");

            if (valor === "" || isNaN(valor)) {
                return null;
            }

            let numero = Number(valor);

            if (numero <= 0) {
                return null;
            }

            return numero;
        }

        function truncarDosDecimales(numero) {
            return Math.trunc(numero * 100) / 100;
        }

        function calcularFresnel() {
            const distanciaInput = document.getElementById("distancia").value;
            const frecuenciaInput = document.getElementById("frecuencia").value;

            const mensaje = document.getElementById("mensaje");
            const resultado = document.getElementById("resultado");

            mensaje.innerHTML = "";
            resultado.innerHTML = "";

            const distancia = validarNumero(distanciaInput);
            const frecuencia = validarNumero(frecuenciaInput);

            if (distancia === null || frecuencia === null) {
                mensaje.innerHTML = '<div class="error">Ingrese solo números válidos. Puede usar coma o punto.</div>';
                return;
            }

            const fresnel = 8.656 * Math.sqrt(distancia / frecuencia);
            const fresnelTruncado = truncarDosDecimales(fresnel);


            resultado.innerHTML = `F1 = ${fresnelTruncado.toFixed(2)} metros`;
        }
    </script>

</body>

</html>
